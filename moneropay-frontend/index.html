<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneroPay — AI-to-AI Payments</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --accent: #ff6b35;
      --accent2: #f7931a;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .logo span { color: var(--text); }
    .badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      color: var(--green);
    }
    .badge.error { color: var(--red); }

    .status-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.875rem;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .status-dot.offline { background: var(--red); }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
    }
    .card.full { grid-column: 1 / -1; }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .card-action {
      font-size: 0.75rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .card-action:hover { text-decoration: underline; }

    .balance { font-size: 2.25rem; font-weight: 700; margin-bottom: 0.25rem; }
    .balance-usd { font-size: 0.9rem; color: var(--muted); margin-bottom: 1rem; }
    .balance-locked { font-size: 0.8rem; color: var(--red); display: none; }
    .balance-locked.show { display: block; }

    .address-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-family: monospace;
      font-size: 0.75rem;
      overflow: hidden;
    }
    .address-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--accent2); }
    .copy-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.875rem; padding: 0 0.25rem;
      flex-shrink: 0;
    }
    .copy-btn:hover { color: var(--text); }

    .tx-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .tx-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--bg);
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .tx-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .tx-icon.in { background: rgba(63,185,80,0.15); color: var(--green); }
    .tx-icon.out { background: rgba(248,81,73,0.15); color: var(--red); }
    .tx-info { flex: 1; }
    .tx-desc { font-weight: 500; }
    .tx-meta { font-size: 0.75rem; color: var(--muted); }
    .tx-amount { font-weight: 600; }
    .tx-amount.positive { color: var(--green); }
    .tx-amount.negative { color: var(--red); }

    .empty-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.875rem; }
    .empty-state-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    .request-form { display: flex; flex-direction: column; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
    .form-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      width: 100%;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.25rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .qr-section { text-align: center; margin-top: 1rem; display: none; }
    .qr-section.show { display: block; }
    .qr-code { background: #fff; padding: 1rem; border-radius: 8px; display: inline-block; }
    .qr-uri { font-size: 0.7rem; color: var(--muted); word-break: break-all; margin-top: 0.5rem; max-width: 300px; margin: 0.5rem auto 0; }

    .api-config {
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: rgba(255,107,53,0.08);
      border: 1px solid rgba(255,107,53,0.2);
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .api-config input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      color: var(--text);
      font-family: monospace;
      font-size: 0.75rem;
      width: 100%;
      margin-top: 0.25rem;
    }

    .fee-note {
      margin-top: 1rem;
      padding: 0.75rem;
      background: var(--bg);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .fee-note strong { color: var(--text); }

    .loading { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">🔶 <span>Monero</span>Pay</div>
    <div class="badge" id="netBadge">Connecting...</div>
  </header>

  <div class="api-config">
    <label>API Backend URL</label>
    <input type="text" id="apiBase" value="https://sci-tractor-epson-fairly.trycloudflare.com" />
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Checking backend connection...</span>
  </div>

  <div class="grid">
    <!-- Wallet Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Wallet Balance</div>
        <button class="card-action" onclick="refreshAll()">↻ Refresh</button>
      </div>
      <div class="balance" id="balance">—</div>
      <div class="balance-usd" id="balanceUsd">Loading price...</div>
      <div class="balance-locked" id="balanceLocked">🔒 <span id="unlockInfo"></span></div>

      <div style="margin-top:1rem;">
        <div class="card-title" style="margin-bottom:0.5rem;">Deposit Address</div>
        <div class="address-row">
          <span class="address-text" id="address">—</span>
          <button class="copy-btn" onclick="copyAddress()" title="Copy">📋</button>
        </div>
      </div>
    </div>

    <!-- Request Payment Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Request Payment</div>
      </div>
      <div class="request-form">
        <div class="form-group">
          <label class="form-label">Amount (XMR)</label>
          <input type="number" class="form-input" id="reqAmount" placeholder="0.005" step="0.001" min="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" class="form-input" id="reqDesc" placeholder="AI compute task, data request, etc." />
        </div>
        <div class="form-group">
          <label class="form-label">Expiry (minutes)</label>
          <input type="number" class="form-input" id="reqExpiry" placeholder="30" value="30" />
        </div>
        <button class="btn" id="reqBtn" onclick="createRequest()">Generate Payment Request</button>
      </div>
      <div class="qr-section" id="qrSection">
        <div class="qr-code" id="qrCode"></div>
        <div class="qr-uri" id="qrUri"></div>
      </div>
      <div class="fee-note">
        <strong>Fee:</strong> 0.5% per transaction · Min 0.00001 XMR<br/>
        Settlement auto-processed to your wallet
      </div>
    </div>

    <!-- Transactions -->
    <div class="card full">
      <div class="card-header">
        <div class="card-title">Transaction History</div>
        <span style="font-size:0.75rem;color:var(--muted)" id="txCount"></span>
      </div>
      <div class="tx-list" id="txList">
        <div class="empty-state">
          <div class="empty-state-icon">📡</div>
          No transactions yet.<br/>Deposit XMR to get started.
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const $ = id => document.getElementById(id);
let apiBase = $('apiBase').value.trim();

$('apiBase').addEventListener('change', () => {
  apiBase = $('apiBase').value.trim();
  refreshAll();
});

async function api(path, opts = {}) {
  try {
    const res = await fetch(apiBase + path, {
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error?.message || 'API error');
    return json;
  } catch (e) {
    throw new Error(e.message);
  }
}

async function checkHealth() {
  const dot = $('statusDot');
  const text = $('statusText');
  const badge = $('netBadge');
  try {
    const res = await api('/api/health');
    dot.className = 'status-dot';
    text.textContent = `Online · ${res.data.network} · mode: ${res.data.mode}`;
    badge.textContent = '● LIVE';
    badge.className = 'badge';
    return true;
  } catch (e) {
    dot.className = 'status-dot offline';
    text.textContent = 'Offline · check API URL or backend';
    badge.textContent = '● OFFLINE';
    badge.className = 'badge error';
    return false;
  }
}

async function refreshWallet() {
  try {
    const [balRes, addrRes] = await Promise.all([
      api('/api/wallet/balance'),
      api('/api/wallet/address')
    ]);

    const xmr = balRes.data.balance / 1e12;
    const unlocked = balRes.data.unlockedBalance / 1e12;
    $('balance').textContent = xmr.toFixed(6) + ' XMR';

    // Fetch XMR price
    try {
      const priceRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=monero&vs_currencies=usd');
      const priceData = await priceRes.json();
      const price = priceData.monero?.usd || 0;
      $('balanceUsd').textContent = price > 0 ? `≈ $${(xmr * price).toFixed(2)} USD` : '';
    } catch {}

    if (unlocked < xmr) {
      $('balanceLocked').classList.add('show');
      $('unlockInfo').textContent = `${(xmr - unlocked).toFixed(4)} XMR locking in ~${balRes.data.timeToUnlock}s`;
    } else {
      $('balanceLocked').classList.remove('show');
    }

    $('address').textContent = addrRes.data;
  } catch (e) {
    $('balance').textContent = 'Error';
    console.error('Wallet error:', e);
  }
}

async function refreshTransactions() {
  try {
    const res = await api('/api/transactions/list');
    const txs = res.data || [];
    $('txCount').textContent = `${txs.length} tx`;

    if (txs.length === 0) {
      $('txList').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📡</div>
          No transactions yet.<br/>Deposit XMR to get started.
        </div>`;
      return;
    }

    $('txList').innerHTML = txs.map(tx => {
      const isIn = !tx.isOutgoing;
      const icon = isIn ? '↓' : '↑';
      const iconClass = isIn ? 'in' : 'out';
      const amount = Math.abs(tx.amount / 1e12).toFixed(6);
      const amountClass = isIn ? 'positive' : 'negative';
      const prefix = isIn ? '+' : '-';
      const desc = tx.note || (isIn ? 'Deposit' : 'Sent');
      const date = tx.timestamp ? new Date(tx.timestamp).toLocaleString() : '';
      return `
        <div class="tx-item">
          <div class="tx-icon ${iconClass}">${icon}</div>
          <div class="tx-info">
            <div class="tx-desc">${desc}</div>
            <div class="tx-meta">${date}</div>
          </div>
          <div class="tx-amount ${amountClass}">${prefix}${amount} XMR</div>
        </div>`;
    }).join('');
  } catch (e) {
    $('txList').innerHTML = `<div class="empty-state">Error loading transactions</div>`;
    console.error('Tx error:', e);
  }
}

async function createRequest() {
  const btn = $('reqBtn');
  const amount = parseFloat($('reqAmount').value);
  const desc = $('reqDesc').value;
  const expiry = parseInt($('reqExpiry').value) || 30;

  if (!amount || amount <= 0) { alert('Enter a valid amount'); return; }

  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    const res = await api('/api/pos/request', {
      method: 'POST',
      body: {
        amountAtomic: Math.round(amount * 1e12),
        currency: 'XMR',
        description: desc,
        expiresInMinutes: expiry
      }
    });

    const uri = res.data.uri || `monero:${res.data.address}?amount=${amount}&tx_description=${encodeURIComponent(desc)}`;

    $('qrSection').classList.add('show');
    const qrEl = document.createElement('canvas');
    $('qrCode').innerHTML = '';
    $('qrCode').appendChild(qrEl);
    QRCode.toCanvas(qrEl, uri, { width: 180, margin: 1 }, err => {
      if (err) $('qrCode').textContent = 'QR error';
    });
    $('qrUri').textContent = uri;
  } catch (e) {
    alert('Request failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate Payment Request';
  }
}

function copyAddress() {
  const addr = $('address').textContent;
  if (addr && addr !== '—') {
    navigator.clipboard.writeText(addr).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = '📋', 1200);
    });
  }
}

async function refreshAll() {
  const ok = await checkHealth();
  if (ok) {
    await Promise.all([refreshWallet(), refreshTransactions()]);
  }
}

// Poll every 30s
refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
