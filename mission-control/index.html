<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control | rentmyai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        /* Top Bar */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #1a1a2e;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }
        
        .topbar-logo {
            font-size: 1.1rem;
            font-weight: bold;
            color: #7dd3fc;
            margin-right: 30px;
        }
        
        .topbar-title {
            color: #a0a0b0;
            font-size: 0.9rem;
        }
        
        .start-chat {
            margin-left: auto;
            background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
            color: #1a1a2e;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Office Container */
        .office-container {
            padding-top: 50px;
            min-height: 100vh;
            background: #1a1a2e;
        }
        
        /* The Office Floor */
        .office {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
        }
        
        /* Checkered Floor */
        .floor {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            grid-template-rows: repeat(12, 50px);
            gap: 2px;
            background: #0d0d15;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #2a2a4e;
        }
        
        .floor-tile {
            width: 100%;
            height: 100%;
        }
        
        .floor-tile.dark { background: #1a1a24; }
        .floor-tile.light { background: #22222e; }
        
        /* Desks */
        .desk {
            position: absolute;
            width: 80px;
            height: 45px;
            background: #3a3a4a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .monitor {
            width: 30px;
            height: 20px;
            background: #3b82f6;
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        
        /* Desk Positions */
        .desk-1 { top: 80px; right: 120px; }
        .desk-2 { top: 80px; left: 120px; }
        .desk-3 { top: 200px; right: 180px; }
        .desk-4 { top: 200px; left: 180px; }
        .desk-5 { top: 320px; right: 120px; }
        .desk-6 { top: 320px; left: 120px; }
        
        /* Conference Table */
        .conference-table {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            background: #2a2a3a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .conference-chair {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #3a3a4a;
            border-radius: 50%;
        }
        
        .chair-1 { top: -20px; left: 30px; }
        .chair-2 { top: -20px; right: 30px; }
        .chair-3 { bottom: -20px; left: 30px; }
        .chair-4 { bottom: -20px; right: 30px; }
        
        /* Water Cooler */
        .water-cooler {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 70px;
            background: #3b82f6;
            border-radius: 4px;
        }
        
        .water-cooler::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
        }
        
        /* Plants */
        .plant {
            position: absolute;
            width: 30px;
            height: 40px;
        }
        
        .plant-pot {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15px;
            background: #92400e;
            border-radius: 3px;
        }
        
        .plant-leaves {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 30px;
            background: #22c55e;
            border-radius: 50% 50% 0 0;
        }
        
        .plant-1 { bottom: 40px; left: 40px; }
        .plant-2 { bottom: 40px; right: 40px; }
        
        /* Characters/Avatars */
        .character {
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }
        
        .character:hover {
            transform: scale(1.1);
        }
        
        .character-icon {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        
        .char-ghost {
            background: linear-gradient(135deg, #a855f7, #c084fc);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }
        
        .char-codex {
            background: linear-gradient(135deg, #f97316, #fb923c);
        }
        
        .char-doc {
            background: linear-gradient(135deg, #22c55e, #4ade80);
        }
        
        .char-bryan {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
        }
        
        .name-tag {
            position: absolute;
            bottom: -18px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            white-space: nowrap;
            color: #fff;
        }
        
        /* Status indicator */
        .status-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
        }
        
        .status-indicator.online { background: #4ade80; }
        .status-indicator.idle { background: #f59e0b; }
        
        /* Info Panel */
        .info-panel {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .panel-title {
            font-size: 1.2rem;
            color: #7dd3fc;
            margin-bottom: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: #252540;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #808090;
            margin-top: 5px;
        }
        
        .quick-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .link-btn {
            background: #252540;
            color: #a0a0b0;
            border: 1px solid #3a3a5a;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .link-btn:hover {
            background: #2a2a4e;
            color: #fff;
            border-color: #7dd3fc;
        }
        
        .link-btn.primary {
            background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
            color: #1a1a2e;
            font-weight: 600;
            border: none;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #606080;
            font-size: 0.85rem;
        }
        
        @media (max-width: 768px) {
            .floor {
                grid-template-rows: repeat(12, 35px);
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-logo">🎯 Mission Control</div>
        <div class="topbar-title">rentmyai.ai — Build Council</div>
        <button class="start-chat">+ Start Chat</button>
    </div>
    
    <!-- Office Container -->
    <div class="office-container">
        <div class="office">
            <!-- Checkered Floor -->
            <div class="floor">
                <!-- Grid tiles will be generated by JS -->
            </div>
            
            <!-- Water Cooler -->
            <div class="water-cooler"></div>
            
            <!-- Plants -->
            <div class="plant plant-1">
                <div class="plant-leaves"></div>
                <div class="plant-pot"></div>
            </div>
            <div class="plant plant-2">
                <div class="plant-leaves"></div>
                <div class="plant-pot"></div>
            </div>
            
            <!-- Desks with Monitors -->
            <div class="desk desk-1">
                <div class="monitor"></div>
            </div>
            <div class="desk desk-2">
                <div class="monitor"></div>
            </div>
            <div class="desk desk-3">
                <div class="monitor"></div>
            </div>
            <div class="desk desk-4">
                <div class="monitor"></div>
            </div>
            <div class="desk desk-5">
                <div class="monitor"></div>
            </div>
            <div class="desk desk-6">
                <div class="monitor"></div>
            </div>
            
            <!-- Conference Table -->
            <div class="conference-table">
                <div class="conference-chair chair-1"></div>
                <div class="conference-chair chair-2"></div>
                <div class="conference-chair chair-3"></div>
                <div class="conference-chair chair-4"></div>
            </div>
            
            <!-- Characters -->
            <div class="character char-ghost" style="top: 75px; right: 125px;">
                👻
                <div class="name-tag">Ghost</div>
                <div class="status-indicator online"></div>
            </div>
            
            <div class="character char-codex" style="top: 195px; right: 185px;">
                💻
                <div class="name-tag">Codex</div>
                <div class="status-indicator idle"></div>
            </div>
            
            <div class="character char-doc" style="top: 315px; right: 125px;">
                📄
                <div class="name-tag">DocSmith</div>
                <div class="status-indicator idle"></div>
            </div>
            
            <div class="character char-bryan" style="bottom: 115px; left: 50%; transform: translateX(-50%);">
                👤
                <div class="name-tag">Bryan</div>
                <div class="status-indicator online"></div>
            </div>
        </div>
        
        <!-- Info Panel -->
        <div class="info-panel">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value">3</div>
                    <div class="stat-label">Active Agents</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">12</div>
                    <div class="stat-label">Tasks This Week</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">$2.15</div>
                    <div class="stat-label">Token Usage</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" style="color: #4ade80;">●</div>
                    <div class="stat-label">System Online</div>
                </div>
            </div>
            
            <div class="panel-title">⚡ Quick Actions</div>
            <div class="quick-links">
                <a href="/" class="link-btn primary">+ Start Chat</a>
                <a href="/payments.html" class="link-btn">💳 Add Credits</a>
                <a href="#" class="link-btn">📧 Check Email</a>
                <a href="#" class="link-btn">🧠 View Memory</a>
                <a href="#" class="link-btn">📊 Analytics</a>
            </div>
        </div>
        
        <div class="footer">
            rentmyai.ai — Autonomous AI Marketplace
        </div>
    </div>
    
    <script>
        // Generate checkered floor
        const floor = document.querySelector('.floor');
        for (let row = 0; row < 12; row++) {
            for (let col = 0; col < 16; col++) {
                const tile = document.createElement('div');
                tile.className = 'floor-tile ' + ((row + col) % 2 === 0 ? 'dark' : 'light');
                floor.appendChild(tile);
            }
        }
    </script>
</body>
</html>
